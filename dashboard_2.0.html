  --accent-blue: #2567c9; --accent-purple: #7115b7; --accent-pink: #ad2167;

  --task-blue-2: #1d4ed8;

  --task-blue-6: #1e88e5;
  --task-blue-7: #0284c7;
  --task-blue-8: #0369a1;

  --grid-blue-dark-1: var(--task-blue-1);
  --grid-blue-dark-2: var(--task-blue-1);

  --accent-green: #2a7851; --accent-orange: #dd6b20; --accent-red: #e53e3e;

  --font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  --control-height: 34px;
  --control-radius: 8px;
   --control-gap: 8px;
   /* Visual equivalent of ~3 spaces at 14px UI font */
   --special-btn-gap: 16px;
   --header-bg: #243038;
  /* Brighter, more saturated header gradient */
  --header-grad-start: rgba(46,197,117,.62);

 /* Surface + text colors */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

button{transition:filter .15s}

 .header__btn{font-size:14px;font-weight:400;color:var(--text-primary);background:var(--control-bg);border:1px solid var(--control-border);padding:0;border-radius:var(--control-radius);cursor:pointer;font-family:var(--font-family);box-shadow:0 1px 0 rgba(0,0,0,.25);width:var(--control-height);height:var(--control-height);box-sizing:border-box;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
  .header__btn svg{width:18px;height:18px;fill:none;stroke:var(--text-primary);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.workspace{display:grid;grid-template-columns:minmax(350px,auto) minmax(250px,1fr);grid-template-rows:1fr 132px;gap:14px;padding:14px 24px 18px;overflow:hidden}
.top-row,.bottom-row{display:contents}

@supports (-webkit-touch-callout: none) {

.top-chart{grid-column:2;grid-row:2;min-height:0}

.widget{background:var(--bg-secondary);border-radius:14px;border:1px solid var(--border-color);display:flex;flex-direction:column;overflow:hidden}
.widget__header{padding:10px 16px;flex-shrink:0}

.stacked-bar-wrap{display:flex;flex-direction:column;width:100%;height:100%;min-height:72px;align-self:center}

.stacked-seg::before{content:'';position:absolute;inset:0;background:inherit;border-radius:inherit;z-index:-1;transition:inset .15s}

.stacked-seg:hover::before{inset:-1px}
.stacked-seg.dimmed:hover{filter:none;box-shadow:none}
.stacked-seg.dimmed:hover::before{inset:0}
.stacked-seg.dimmed{opacity:.2}

.kpi-row{display:flex;flex-direction:column;gap:10px;flex-shrink:0;padding:0 6px 10px}

.sprint-grid{display:flex;flex-direction:column;height:100%;overflow:hidden;position:relative}

.sprint-days span{text-align:center;font-size:14px;color:var(--text-secondary);font-weight:400;line-height:1.2}
.sprint-days span:first-child{text-align:left}
.sprint-days .weekend{color:var(--accent-red)}
.sprint-days span.day-header{cursor:pointer;user-select:none;border-radius:4px;padding:0 2px;transition:background .15s,color .15s}
.sprint-days span.day-header:hover{background:var(--bg-hover);color:var(--text-primary)}
.sprint-days span.day-header.col-holiday{color:var(--accent-red);font-weight:600}
/* A weekend explicitly marked as working should look like a normal workday header */
.sprint-days span.day-header.working-weekend{color:var(--text-secondary);font-weight:400}
.sprint-days b{font-weight:600}
.sprint-rows{display:flex;flex-direction:column;gap:16px;flex:1;min-height:0}
.sprint-row{display:grid;gap:8px;flex:1;min-height:0;grid-auto-rows:minmax(min-content,auto);align-items:start}
/* If a surname wraps to the 2nd line, keep the row top-aligned */
.sprint-row.wrapped{align-items:start}
.sprint-name{color:var(--text-secondary);font-size:14px;font-weight:400;cursor:pointer;
  /* Keep first line baseline stable; second line grows DOWN */
  line-height:16px;
  padding-top:0;
  white-space:normal;overflow:visible;word-break:break-word;
  display:block;
}
.sprint-name:hover{color:var(--text-primary)}
.sprint-name.active{color:var(--text-primary)}
.sprint-name.dimmed{color:var(--text-dimmed)}
.sprint-load{font-size:14px;color:var(--accent-blue);font-weight:400;display:grid;grid-template-columns:36px var(--bar-name-span-width,110px);grid-template-rows:16px 5px;column-gap:var(--load-to-name-gap,8px);row-gap:9px;align-items:start;justify-content:start;padding-top:0;line-height:16px;overflow:visible;width:max-content;min-width:0;align-self:start}
.sprint-load__num{height:16px;line-height:16px;display:block;text-align:center;grid-column:1;grid-row:1;width:36px}
.sprint-row.wrapped .sprint-load{align-items:center}
.sprint-load.dimmed{color:var(--text-dimmed)}
.day-cell{display:flex;flex-direction:column;gap:2px;min-height:0;position:relative;align-self:stretch}
.block{flex:1;min-height:4px;border-radius:var(--control-radius);display:flex;align-items:center;justify-content:center;font-size:16px;color:rgba(255,255,255,.9);font-weight:400;overflow:visible;cursor:pointer;transition:filter .15s, box-shadow .15s;position:relative;z-index:0;min-width:0}
.block.blue,.block.red-work{font-weight:600}
.block::before{content:'';position:absolute;inset:0;background:inherit;border-radius:inherit;z-index:-1;transition:inset .15s}
.day-cell>.block:first-child{border-bottom-left-radius:0;border-bottom-right-radius:0}
.day-cell>.block:last-child{border-top-left-radius:0;border-top-right-radius:0}
.day-cell>.block:hover{filter:brightness(1.1);box-shadow:0 2px 4px rgba(0,0,0,.2)}
.day-cell>.block:hover::before{inset:-1px}
.day-cell>.block.dimmed:hover{filter:none;box-shadow:none}
.day-cell>.block.dimmed:hover::before{inset:0}
.block.vac{background:var(--vac-block-bg);color:var(--vac-block-text);font-size:12px}
  /* Task edge markers (start/end of a contiguous run) */
  .block .edge{position:absolute;top:50%;transform:translateY(-50%);line-height:1;color:rgba(255,255,255,.5) !important;opacity:.5 !important;font-size:.8em;pointer-events:none}
  .block .edge-start{left:6px}
  .block .edge-end{right:6px}
  /* Middle cells inside a run: show pale, non-bold number */
  .block .mid-task-num{font-weight:400;color:rgba(255,255,255,.5);opacity:.5;pointer-events:none}
.block.red{background:var(--slot-holiday)}
.block.red-work{background:var(--accent-red)}
.block.green{background:var(--accent-green)}
 /* Grid task fill uses alternating blue shades via inline style in makeBlock() */
 .block.blue{background:var(--accent-blue)}
.block.dimmed{background:var(--block-dimmed-bg) !important;color:var(--block-dimmed-text)}
.block.red.dimmed{background:var(--block-dimmed-bg) !important}
.block.vac.dimmed{background:var(--accent-vacation) !important}
.block.red-work.dimmed{background:var(--block-dimmed-bg) !important}
.block.green.dimmed{background:var(--block-dimmed-bg) !important}
.block.highlighted{box-shadow:none;color:#fff}
.legend{display:flex;gap:14px;padding:8px 16px;border-top:1px solid var(--border-color);flex-shrink:0}
.legend__item{display:flex;align-items:center;gap:5px;font-size:14px;color:var(--text-secondary);font-weight:400}

 .legend__dot{width:16px;height:16px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:12px;line-height:1;color:rgba(255,255,255,.9);font-weight:700}

.task-list{flex:1;min-height:0;overflow:hidden}

.task-num{color:var(--accent-blue);font-weight:600;min-width:22px;font-size:14px}
.task-item.unassigned .task-num{color:var(--accent-red)}

/* dept labels removed */

 .special-btns{display:flex;align-items:center;justify-content:flex-start;gap:var(--special-btn-gap, var(--control-gap));padding:0 6px 4px;flex-shrink:0}

 .special-btn{font-size:14px;font-weight:400;padding:7px 0;border:none;cursor:pointer;font-family:var(--font-family);color:var(--text-secondary);flex:0 0 auto;min-width:0;text-align:left;white-space:nowrap;background:transparent;box-shadow:none;height:var(--control-height);box-sizing:border-box;display:inline-flex;align-items:center;justify-content:flex-start;transition:color .15s}

 .special-btn:active{transform:none;box-shadow:none}

  /* Default text color: holiday=red, free=green, vac=slightly gray */
  .special-btn--vac{color:var(--text-secondary)}
 .special-btn--holiday{color:var(--accent-red)}
 .special-btn--free{color:var(--accent-green)}
  /* Hover: brighten to white */
  .special-btn--vac:hover{color:#fff}
 .special-btn--holiday:hover{color:#fff}
 .special-btn--free:hover{color:#fff}

 /* When these buttons are in selection/assign states, keep previous semantics */
 .special-btn.active,
 .special-btn.assign-current{color:var(--text-primary)}
 /* no background plaques */
 .special-btn.active{background:transparent}
 .special-btn.assign-available{opacity:.55}
 .special-btn.assign-available:hover{opacity:1;background:transparent;color:var(--text-primary);border-color:transparent}
 .special-btn.assign-current{opacity:1}
 .special-btn.active{opacity:1}

 /* If the button is active, keep it as neutral bg-hover (no semantic fill). */
 .special-btn--vac.active,
 .special-btn--holiday.active,
 .special-btn--free.active{background:transparent;border-color:transparent;color:var(--text-primary)}
 .special-btn.dimmed{opacity:.3}
.special-btn .btn-dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}

.add-task-input::placeholder{color:var(--text-muted)}
.add-task-input:focus{border-color:var(--accent-blue)}
.add-task-btns{display:none;gap:var(--control-gap);justify-content:flex-end}
.add-task-btns.visible{display:flex}
.add-task-btn{font-size:14px;font-weight:400;padding:7px 10px;border-radius:var(--control-radius);border:none;cursor:pointer;font-family:var(--font-family);height:var(--control-height);box-sizing:border-box;display:inline-flex;align-items:center}
.add-task-btn.ok{background:var(--accent-blue);color:#fff}
 .add-task-btn.cancel{background:var(--control-bg);color:var(--text-secondary);border:1px solid var(--control-border)}

.block{position:relative}
.block.assign-target{box-shadow:inset 0 0 0 2px var(--text-primary)}

.task-del{width:20px;height:20px;border-radius:4px;border:none;background:var(--accent-red);color:#fff;font-size:14px;line-height:1;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font-family);padding:0;margin-left:auto}

<script>
var TASK_COLORS=['#e53e3e','#dd6b20','#d69e2e','#38a169','#319795','#3182ce','#805ad5','#d53f8c','#c05621','#e07b53','#f6ad55','#68d391','#4fd1c5','#63b3ed','#b794f4','#f687b3','#fc8181','#fbd38d','#9ae6b4','#81e6d9','#90cdf4','#d6bcfa'];
// Safari compatibility shims (keep ES5 syntax)
try{
  if(typeof NodeList!=='undefined' && NodeList.prototype && !NodeList.prototype.forEach){
    NodeList.prototype.forEach=function(cb, thisArg){
      for(var i=0;i<this.length;i++)cb.call(thisArg, this[i], i, this);
    };
  }
}catch(e){void e;}
try{
  if(typeof Promise!=='undefined' && Promise.prototype && !Promise.prototype.finally){
    Promise.prototype.finally=function(onFinally){
      var P=this.constructor;
      return this.then(
        function(v){return P.resolve(onFinally && onFinally()).then(function(){return v;});},
        function(err){return P.resolve(onFinally && onFinally()).then(function(){throw err;});}
      );
    };
  }
}catch(e){void e;}
try{
  if(typeof Element!=='undefined' && Element.prototype && !Element.prototype.closest){
    Element.prototype.closest=function(sel){
      var el=this;
      while(el && el.nodeType===1){
        if(el.matches && el.matches(sel))return el;
        el=el.parentElement;
      }
      return null;
    };
  }
}catch(e){void e;}
// Source dashboard must start empty; load from spr.xlsx via button.
var tasks=[];
var departments=[{"name":"","members":[]}];
var isWeekend=[];
var workingWeekends=[]; // indices of weekends overridden as working days
var team=[];
var sprintDays=[];
var sprintDates=[];

// Undo stack (Cmd+Z on macOS / Ctrl+Z on PC)
var historyStack=[];
var HISTORY_LIMIT=100;

// localStorage auto-save key
var LS_STATE_KEY='SPRINT_LD_AUTOSAVE';
// Persist only the manual roster (employee surnames) across refresh.
// This keeps the default state clean (no tasks assigned) while preserving manual add/delete.
var LS_ROSTER_KEY='SPRINT_LD_ROSTER';

function getPeriodControlValue(el){
  if(!el)return '';
  if(typeof el.value!=='undefined')return String(el.value||'');
  return String(el.getAttribute('data-value')||'');
}

function setPeriodControlValue(el, value){
  if(!el)return;
  value=String(value||'').trim();
  if(typeof el.value!=='undefined')el.value=value;
  el.setAttribute('data-value', value);
  if(el.tagName && el.tagName.toLowerCase()==='button'){
    el.textContent=value || 'DD.MM';
    if(value)el.classList.remove('is-empty');
    else el.classList.add('is-empty');
  }
}

function ddmmToInputDate(value){
  var m=String(value||'').match(/^(\d{2})\.(\d{2})$/);
  if(!m)return '';
  var y=(new Date()).getFullYear();
  return y+'-'+pad2(parseInt(m[2],10))+'-'+pad2(parseInt(m[1],10));
}

function inputDateToDdmm(value){
  var m=String(value||'').match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m)return '';
  return m[3]+'.'+m[2];
}

function autoSaveToLocalStorage(){
  try{
    var ps=document.getElementById('periodStart');
    var pe=document.getElementById('periodEnd');
    var state={
      tasks:tasks,
      team:team,
      isWeekend:isWeekend,
      workingWeekends:workingWeekends,
      sprintDays:sprintDays,
      sprintDates:sprintDates,
      periodStart:getPeriodControlValue(ps),
      periodEnd:getPeriodControlValue(pe)
    };
    localStorage.setItem(LS_STATE_KEY, JSON.stringify(state));
  }catch(e){void e;}
}

function normalizeTasks(){
  tasks=(Array.isArray(tasks)?tasks:[]).map(function(t){
    if(!t)return t;
    if(typeof t.completed==='undefined')t.completed=false;
    t.completed=!!t.completed;
    return t;
  });
}

function getTaskById(taskId){
  if(!Array.isArray(tasks))return null;
  for(var i=0;i<tasks.length;i++){
    if(tasks[i]&&tasks[i].id===taskId)return tasks[i];
  }
  return null;
}

function isTaskCompleted(tid){
  if(!(tid>0))return false;
  var t=getTaskById(tid);
  return !!(t&&t.completed);
}

function isTaskAssigned(taskId){
  if(!(taskId>0) || !Array.isArray(team))return false;
  for(var ei=0;ei<team.length;ei++){
    var emp=team[ei];
    if(!emp || !Array.isArray(emp.tasks))continue;
    for(var di=0;di<emp.tasks.length;di++){
      var dt=emp.tasks[di];
      if(!Array.isArray(dt))continue;
      if((dt[0]||0)===taskId || (dt[1]||0)===taskId)return true;
    }
  }
  return false;
}

function saveRosterToLocalStorage(){
  try{
    if(window.__SPRINT_LD_IS_COPY__)return;
    var names=(Array.isArray(team)?team.map(function(e){return String((e&&e.name)||'').trim();}).filter(function(n){return !!n;}):[]);
    localStorage.setItem(LS_ROSTER_KEY, JSON.stringify({names:names}));
  }catch(e){void e;}
}

function loadRosterFromLocalStorage(){
  try{
    if(window.__SPRINT_LD_IS_COPY__)return null;
    var raw=localStorage.getItem(LS_ROSTER_KEY);
    if(!raw)return null;
    var data=JSON.parse(raw);
    if(!data || !Array.isArray(data.names))return null;
    var names=data.names.map(function(n){return String(n||'').trim();}).filter(function(n){return !!n;});
    if(!names.length)return null;
    return names;
  }catch(e){return null;}
}

function applyDefaultEmptyState(){
  // Default (dashboard.html): no tasks, green table (except weekends), no extra weekend overrides.
  tasks=[];
  workingWeekends=[];
  // Ensure period-derived arrays exist.
  applySprintPeriod(null);
  var baseNames=(Array.isArray(window.__SPRINT_LD_STATE__ && window.__SPRINT_LD_STATE__.team)?
    window.__SPRINT_LD_STATE__.team.map(function(e){return String((e&&e.name)||'').trim();}).filter(function(n){return !!n;})
    :
    (Array.isArray(team)?team.map(function(e){return String((e&&e.name)||'').trim();}).filter(function(n){return !!n;}):[])
  );
  var roster=loadRosterFromLocalStorage();
  var names=(roster && roster.length)?roster:baseNames;
  team=names.map(function(n){
    var t=sprintDays.map(function(_,idx){return isWeekend[idx]?null:[0,0]});
    return {name:n,tasks:t};
  });
  departments=[{name:'',members:team}];
  team.sort(function(a,b){return safeLocaleCompare(a.name||'', b.name||'', 'ru')});
}

function autoLoadFromLocalStorage(){
  try{
    var raw=localStorage.getItem(LS_STATE_KEY);
    if(!raw)return false;
    var state=JSON.parse(raw);
    if(!state)return false;
    var hasTeam=Array.isArray(state.team)&&state.team.length>0;
    var hasTasks=Array.isArray(state.tasks)&&state.tasks.length>0;
    if(!hasTeam&&!hasTasks)return false;
    if(hasTasks){tasks=state.tasks;normalizeTasks();}
    if(hasTeam)team=state.team;
    departments=[{name:'',members:team}];
    if(Array.isArray(state.isWeekend))isWeekend=state.isWeekend;
    if(Array.isArray(state.workingWeekends))workingWeekends=state.workingWeekends;
    if(Array.isArray(state.sprintDays))sprintDays=state.sprintDays;
    if(Array.isArray(state.sprintDates))sprintDates=state.sprintDates;
    var ps=document.getElementById('periodStart');
    var pe=document.getElementById('periodEnd');
    if(ps)setPeriodControlValue(ps,String(state.periodStart||''));
    if(pe)setPeriodControlValue(pe,String(state.periodEnd||''));
    return true;
  }catch(e){return false;}
}

function clearAutoSave(){
  try{localStorage.removeItem(LS_STATE_KEY);}catch(e){void e;}
}

function getHistorySnapshot(){
  var ps=document.getElementById('periodStart');
  var pe=document.getElementById('periodEnd');
  return {
    tasks: tasks,
    team: team,
    isWeekend: isWeekend,
    workingWeekends: workingWeekends,
    sprintDays: sprintDays,
    sprintDates: sprintDates,
    periodStart: getPeriodControlValue(ps),
    periodEnd: getPeriodControlValue(pe),
  };
}

function pushHistory(){
  try{
    historyStack.push(JSON.stringify(getHistorySnapshot()));
    if(historyStack.length>HISTORY_LIMIT){
      historyStack.splice(0, historyStack.length-HISTORY_LIMIT);
    }
  }catch(e){void e;}
  autoSaveToLocalStorage();
}

function restoreFromSnapshot(snap){
  tasks=Array.isArray(snap.tasks)?snap.tasks:[];normalizeTasks();
  team=Array.isArray(snap.team)?snap.team:[];
  departments=[{name:'',members:team}];
  isWeekend=Array.isArray(snap.isWeekend)?snap.isWeekend:[];
  workingWeekends=Array.isArray(snap.workingWeekends)?snap.workingWeekends:[];
  if(Array.isArray(snap.sprintDays))sprintDays=snap.sprintDays;
  if(Array.isArray(snap.sprintDates))sprintDates=snap.sprintDates;
  var ps=document.getElementById('periodStart');
  var pe=document.getElementById('periodEnd');
  if(ps)setPeriodControlValue(ps,String(snap.periodStart||''));
  if(pe)setPeriodControlValue(pe,String(snap.periodEnd||''));

  // Clear interaction modes
  paintSnapshot=null;paintTaskId=null;
  activeTaskId=null;activeEmpIdx=null;
  clearAssignMode();
  removeHighlight();

  normalizeTeamTasksLength();
  rebuildDaysRow();
  renderTaskList();
  updateTaskColumns();
  recalc();
  renderBar();
  rebuildGrid();
  updateSaveButtonLabel();
}

function undoLastAction(){
  if(!historyStack.length)return;
  try{
    var raw=historyStack.pop();
    var snap=JSON.parse(raw||'{}');
    restoreFromSnapshot(snap);
  }catch(e){void e;}
}

function clearAutoSave(){
  try{localStorage.removeItem(LS_STATE_KEY);}catch(e){void e;}
}

function isEditableTarget(t){
  if(!t)return false;
  if(t.isContentEditable)return true;
  var tag=(t.tagName||'').toLowerCase();
  return tag==='input' || tag==='textarea' || tag==='select';
}
// Restore state from localStorage (auto-save) — source dashboard persistence
var _restoredFromLS=false;
if(!window.__SPRINT_LD_IS_COPY__){
  _restoredFromLS=autoLoadFromLocalStorage();
}
// Only add departments to team if we haven't already loaded team from localStorage
if(!_restoredFromLS){
  departments.forEach(function(d){d.members.forEach(function(m){team.push(m)})});
}
// Restore state if the file was saved from UI (only if localStorage wasn't loaded)
if(window.__SPRINT_LD_STATE__ && !_restoredFromLS){

function recalc(){
  var wwSet={};
  if(Array.isArray(workingWeekends))workingWeekends.forEach(function(i){wwSet[i]=true});
  // A day is "effective workday" if it's not a weekend, or it's a weekend overridden as working.
  // NOTE: column-wide holidays (all employees = HOLIDAY for both slots) are handled below.
  function isEffWorkday(di){return !isWeekend[di]||!!wwSet[di]}
  var teamCount=getEffectiveTeamCount();
  taskBlockCounts={};holidayBlocks=0;vacationBlocks=0;
  tasks.forEach(function(t){taskBlockCounts[t.id]=0});
  // Pre-compute which days are column-wide holidays (all employees, both slots = HOLIDAY)
  var colHolidayDays=[];
  if(Array.isArray(team)&&team.length>0){
    for(var ci=0;ci<sprintDays.length;ci++){
      if(!isEffWorkday(ci)){colHolidayDays.push(false);continue;}
      var allH=true;
      for(var ei=0;ei<team.length;ei++){
        var dt=team[ei].tasks[ci];
        if(!Array.isArray(dt)||(dt[0]||0)!==SPECIAL_HOLIDAY_ID||(dt[1]||0)!==SPECIAL_HOLIDAY_ID){allH=false;break;}
      }
      colHolidayDays.push(allH);
    }
  }
  // Workday count for maxBlocks should exclude column-wide holidays.
  var workdayCount=0;
  for(var wi=0;wi<sprintDays.length;wi++){
    if(!isEffWorkday(wi))continue;
    if(colHolidayDays[wi])continue;
    workdayCount++;
  }

  team.forEach(function(e){e.tasks.forEach(function(dt,dayIdx){
    if(!Array.isArray(dt))return;
    dt.forEach(function(tid){
      if(tid===0)return;
      if(tid===SPECIAL_VACATION_ID && isEffWorkday(dayIdx)){vacationBlocks++;return;}
      // Skip column-wide holidays in barchart — only count individual holidays
      if(tid===SPECIAL_HOLIDAY_ID&&isEffWorkday(dayIdx)&&!colHolidayDays[dayIdx])holidayBlocks++;
      else if(tid>0&&isEffWorkday(dayIdx)){taskBlockCounts[tid]=(taskBlockCounts[tid]||0)+1}
    });
  })});
  totalBlocks=0;for(var k in taskBlockCounts)totalBlocks+=taskBlockCounts[k];
  maxBlocks=teamCount*workdayCount*2;
  if(!maxBlocks || maxBlocks<0)maxBlocks=0;
  freeBlocks=maxBlocks-totalBlocks-holidayBlocks-vacationBlocks;
  if(freeBlocks<0)freeBlocks=0;
  var loadEl=document.getElementById('kpiLoad');
  if(loadEl){
    if(team.length>0)loadEl.textContent=((totalBlocks*0.05)/team.length).toFixed(2);
    else loadEl.textContent='—';
  }
  var taskEl=document.getElementById('kpiTasks');
  if(taskEl)taskEl.textContent=tasks.length?String(tasks.length):'—';
}

var taskIndexById={};
function rebuildTaskIndexById(){
  taskIndexById={};

 function getTaskColor(tid){var idx=tasks.findIndex(function(t){return t.id===tid});return idx>=0?TASK_COLORS[idx%TASK_COLORS.length]:'#666'}

  // Grid and bar chart should not introduce a wide variety of hues.
  // We keep only TWO blue shades for the bar chart and FOUR for the grid (2 dark + 2 light).
  // Bar chart must use only TWO blue shades.
  // Keep a stable mapping task-index -> (light|dark) family.
  // This also defines the grid's light/dark family so bar chart and grid stay consistent.
  function isTaskBlueLightByIndex(idx){
    // Alternate families by task index.
    // idx: 0 -> dark, 1 -> light, 2 -> dark, 3 -> light ...
    return (idx%2)===1;
  }
  function isTaskBlueLightById(tid){
    var idx=(taskIndexById && typeof taskIndexById[tid]==='number')?taskIndexById[tid]:tasks.findIndex(function(t){return t.id===tid});
    if(idx<0)return false;
    return isTaskBlueLightByIndex(idx);
  }

  function getTaskBarBlueShadeByIndex(idx){
    // Exactly two shades of blue for the bar chart.
    return isTaskBlueLightByIndex(idx)?'var(--task-blue-4)':'var(--task-blue-1)';
  }
  function getTaskBarBlueShadeById(tid){
    var idx=(taskIndexById && typeof taskIndexById[tid]==='number')?taskIndexById[tid]:tasks.findIndex(function(t){return t.id===tid});
    if(idx<0)return 'var(--accent-blue)';
    return getTaskBarBlueShadeByIndex(idx);
  }
  // Grid uses ONLY TWO blue shades, and alternation in a row is independent from bar chart.
  // variantIdx controls the shade: 0 -> dark, 1 -> light.
  function getTaskBlueGridShadeById(tid, variantIdx){
    var idx=(taskIndexById && typeof taskIndexById[tid]==='number')?taskIndexById[tid]:tasks.findIndex(function(t){return t.id===tid});
    if(idx<0)return 'var(--accent-blue)';
    var v=(variantIdx%2===0)?0:1;
    return v===0?'var(--task-blue-1)':'var(--task-blue-4)';
  }

  // Legacy function kept for compatibility in grid/weekend-work blocks.
  // Now matches bar chart two-shade logic (no hue variety).
  function getTaskBlueShadeById(tid){
    return getTaskBarBlueShadeById(tid);

function renderBar(){
  rebuildTaskIndexById();
  var el=document.getElementById('stackedBar');el.innerHTML='';
  if(!maxBlocks || maxBlocks<=0){
    return;
  }
  // For load segments, bar chart must use only TWO blue shades.
  var sd=tasks.map(function(t,i){
    return {id:t.id,blocks:taskBlockCounts[t.id]||0,color:getTaskBarBlueShadeById(t.id)};
  });
  sd.push({id:SPECIAL_FREE_ID,blocks:freeBlocks,color:'#2f855a'});
  if(holidayBlocks>0)sd.push({id:SPECIAL_HOLIDAY_ID,blocks:holidayBlocks,color:'rgba(229,62,62,0.15)'});
  if(vacationBlocks>0)sd.push({id:SPECIAL_VACATION_ID,blocks:vacationBlocks,color:'var(--vac-block-bg)'});

  // Stable percentage math (basis points) to avoid float jitter.
  // pctBp = percent * 100 (e.g., 12.34% => 1234)
  var cumLeftBp=0;
  sd.forEach(function(s){
    var pctBp=Math.round((s.blocks*10000)/maxBlocks);
    if(pctBp<0)pctBp=0;
    s.pctBp=pctBp;
    s.pct=pctBp/100;
    s.left=cumLeftBp/100;
    cumLeftBp+=pctBp;
  });

  var labelsAbove=document.createElement('div');labelsAbove.className='stacked-labels';
  labelsAbove.style.height='16px';
  var spacerAbove=document.createElement('div');spacerAbove.className='stacked-spacer';
  var barRow=document.createElement('div');barRow.className='stacked-bar';
  var spacerBelow=document.createElement('div');spacerBelow.className='stacked-spacer';
  var labelsBelow=document.createElement('div');labelsBelow.className='stacked-labels';
  labelsBelow.style.height='16px';

   // Anti-collision: track right edge of last placed label in each row (in %).
   // Seed to a small negative value so the first label at 0% is not skipped.
   var prevRightAbove=-999, prevRightBelow=-999;
  // Minimum segment width (%) to show a label. Below 1% = skip.
  var MIN_LABEL_PCT=1;
  // Minimum gap (%) between labels to avoid overlap.
  // A label "XX%" at 12px font is roughly 3 chars × ~0.7% of bar width ≈ 2%.
  var MIN_GAP_PCT=0.5;

  sd.forEach(function(s,i){
    var pct=s.pct;

    // Bar segment (skip visually invisible ones)
    if(s.pctBp>=50){
      var seg=document.createElement('div');seg.className='stacked-seg';seg.setAttribute('data-seg-id',s.id);
      seg.style.width=pct.toFixed(2)+'%';seg.style.background=s.color;
      if(s.id>0){
        var segLbl=document.createElement('span');segLbl.className='seg-label';segLbl.textContent=String(taskDisplayNum(s.id));
        seg.appendChild(segLbl);
      }
      else if(s.id===SPECIAL_VACATION_ID){
        var segLblVac=document.createElement('span');segLblVac.className='seg-label';segLblVac.textContent='О';
        seg.appendChild(segLblVac);
      }
      seg.addEventListener('click',function(){toggleHighlight(s.id)});
      barRow.appendChild(seg);
    }

    // Label — always under/above bar, with anti-collision
    if(s.pctBp<MIN_LABEL_PCT*100){
      return;
    }

    var lblText=Math.round(s.pctBp/100)+'%';
    var isAbove=(i%2)===0;
    var prevRight=isAbove?prevRightAbove:prevRightBelow;
    var targetRow=isAbove?labelsAbove:labelsBelow;

    if(s.left>=prevRight+MIN_GAP_PCT){
      var labelEl=document.createElement('div');labelEl.className='stacked-label';
      labelEl.style.left=s.left+'%';
      labelEl.style.width=pct.toFixed(2)+'%';
      labelEl.textContent=lblText;
      targetRow.appendChild(labelEl);
      if(isAbove){prevRightAbove=s.left+pct;}
      else{prevRightBelow=s.left+pct;}
    }
  });

  el.appendChild(labelsAbove);
  el.appendChild(spacerAbove);
  el.appendChild(barRow);
  el.appendChild(spacerBelow);
  el.appendChild(labelsBelow);
}

function updateTaskColumns(){
  var el=document.getElementById('taskList');
  if(!el)return;
  var items=el.querySelectorAll('.task-item');
  if(items.length===0){el.style.columnCount='';return;}
  var elH=el.getBoundingClientRect().height;
  if(elH<10){el.style.columnCount='';return;}
  // Measure actual item height from rendered items
  var itemH=0;
  for(var i=0;i<Math.min(items.length,5);i++){itemH+=items[i].getBoundingClientRect().height;}
  if(itemH===0){el.style.columnCount='';return;}
  var avgH=itemH/Math.min(items.length,5);
  var maxPerCol=Math.max(1,Math.floor(elH/avgH));
  var cols=Math.max(1,Math.min(3,Math.ceil(items.length/maxPerCol)));
  var colWidth=260;
  el.style.columnCount=cols;
  el.style.columnGap=(cols>1?'12px':'0px');
  el.style.columnFill='auto';
  var sw=document.querySelector('.summary-widget');
  if(!sw)return;
  var ws=document.querySelector('.workspace');
  if(cols>1){
    var gap=12*(cols-1);
    var w=Math.ceil(colWidth*cols+gap+32);
    sw.style.width=w+'px';
    sw.style.minWidth=w+'px';
    sw.style.maxWidth=w+'px';
    if(ws){ws.style.gridTemplateColumns=w+'px minmax(250px,1fr)';}
  }else{
    sw.style.width='';
    sw.style.minWidth='';
    sw.style.maxWidth='';
    if(ws){ws.style.gridTemplateColumns='';}
  }
}

function parseHeaderPeriod(raw){
  var text=(raw!=null?String(raw):'').trim();
  if(!text){
    var s=document.getElementById('periodStart');
    var e=document.getElementById('periodEnd');
    var start=getPeriodControlValue(s).trim();
    var end=getPeriodControlValue(e).trim();
    if(start && end)text=start+'-'+end;
  }
  var m=text.match(/(\d{2})\.(\d{2})-(\d{2})\.(\d{2})/);
  if(!m)return null;
  return {d1:int(m[1]),m1:int(m[2]),d2:int(m[3]),m2:int(m[4])};
}

function int(s){return parseInt(s,10)}

function buildSprintDatesFromHeader(raw){
  var m=parseHeaderPeriod(raw);
  if(!m)return null;
  var y=(new Date()).getFullYear();
  var start=new Date(y,m.m1-1,m.d1);
  var end=new Date(y,m.m2-1,m.d2);
  if(!(start instanceof Date) || isNaN(start.getTime()) || isNaN(end.getTime()))return null;

  // Support arbitrary inclusive date ranges.
  // If end is before start, treat it as crossing the year boundary.
  if(end.getTime()<start.getTime()){
    end=new Date(y+1,m.m2-1,m.d2);
    if(isNaN(end.getTime()))return null;
  }

  var dates=[];
  var cur=new Date(start);
  while(cur.getTime()<=end.getTime()){
    dates.push({
      d:cur.getDate(),
      m:(cur.getMonth()+1),
      dow:(cur.getDay()+6)%7, // 0=Mon
    });
    cur.setDate(cur.getDate()+1);
  }
  return dates;
}

   if(maxW < baseMin) maxW = baseMin;

   // Do NOT shrink once expanded: prevents the grid from "jittering" and
   // visually compressing on each task assignment re-render.
   var nextW = Math.ceil(maxW);
   if(nextW < gridNameColWidthPx) nextW = gridNameColWidthPx;

   // Cap by available width (only to prevent extreme overflow).
   // Keep a minimum width for each day column so the table doesn't collapse completely.
   var nDays = (sprintDays && sprintDays.length) ? sprintDays.length : 0;

    var colGapPx = 8;

   try{
     if(document.createRange && textEl.firstChild){

       var right=0;
       for(var i=0;i<rects.length;i++){

function calcEmpLoad(emp){
  // Load must be based on EFFECTIVE workdays only:
  // - regular weekdays are workdays
  // - weekends can be overridden as working via workingWeekends[]
  // - pure weekends (not overridden) must not affect load
  // One day (2 half-day slots) = 0.10 load max.
  var wwSet={};
  if(Array.isArray(workingWeekends))workingWeekends.forEach(function(i){wwSet[i]=true});
  function isEffWorkday(di){return !isWeekend[di]||!!wwSet[di]}

  var b=0;
  for(var dayIdx=0;dayIdx<emp.tasks.length;dayIdx++){
    if(!isEffWorkday(dayIdx))continue;
    var dt=emp.tasks[dayIdx];
    if(!Array.isArray(dt))continue;
    // Count real work tasks only.
    // Holidays/vacation/free slots do not increase task load.
    if((dt[0]||0)>0)b++;
    if((dt[1]||0)>0)b++;
  }
  return b*0.05;
}

function calcEmpLoadPercent(emp){
  var wwSet={};
  if(Array.isArray(workingWeekends))workingWeekends.forEach(function(i){wwSet[i]=true});
  function isEffWorkday(di){return !isWeekend[di]||!!wwSet[di]}
  var workSlots=0;
  var loadSlots=0;
  if(!emp || !Array.isArray(emp.tasks))return 0;
  for(var dayIdx=0;dayIdx<sprintDays.length && dayIdx<emp.tasks.length;dayIdx++){
    if(!isEffWorkday(dayIdx))continue;
    workSlots+=2;
    var dt=emp.tasks[dayIdx];
    if(!Array.isArray(dt))continue;
    if((dt[0]||0)>0)loadSlots++;
    if((dt[1]||0)>0)loadSlots++;
  }
  if(!workSlots)return 0;
  return Math.max(0,Math.min(100,(loadSlots/workSlots)*100));
}

function isEmpAllVacation(emp){
  if(!emp || !Array.isArray(emp.tasks) || !Array.isArray(isWeekend))return false;
  var wwSet={};
  if(Array.isArray(workingWeekends))workingWeekends.forEach(function(i){wwSet[i]=true});
  var hasWorkday=false;
  for(var i=0;i<emp.tasks.length && i<isWeekend.length;i++){
    if(isWeekend[i]&&!wwSet[i])continue;
    hasWorkday=true;
    var dt=emp.tasks[i];
    if(!Array.isArray(dt))return false;
    if((dt[0]||0)!==SPECIAL_VACATION_ID)return false;
    if((dt[1]||0)!==SPECIAL_VACATION_ID)return false;
  }
  return hasWorkday;
}

// Employee availability loss vs baseline 10 workdays.
// Baseline: 10 effective workdays => 1.00 capacity.
// For each missing HALF-DAY slot (holiday/vacation or non-effective day), show +0.05.
// If weekends just move around but the number of effective workdays stays 10,
// the value must remain 0.00.
function calcEmpAvailabilityLoss(emp){
  var BASE_WORKDAYS = 10;
  var wwSet={};
  if(Array.isArray(workingWeekends))workingWeekends.forEach(function(i){wwSet[i]=true});
  function isEffWorkday(di){return !isWeekend[di]||!!wwSet[di]}

  // Baseline capacity in half-day slots (2 per workday)
  var baselineSlots = BASE_WORKDAYS * 2;

  // Actual available slots across the sprint, capped by the first 10 effective workdays.
  // Column-wide holiday days (all employees = HOLIDAY for both slots) are NOT considered workdays
  // for availability baseline calculations.
  var colHolidayDays=[];
  if(Array.isArray(team)&&team.length>0){
    for(var ci=0;ci<sprintDays.length;ci++){
      if(!isEffWorkday(ci)){colHolidayDays.push(false);continue;}
      var allH=true;
      for(var ei=0;ei<team.length;ei++){
        var cdt=team[ei].tasks[ci];
        if(!Array.isArray(cdt)||(cdt[0]||0)!==SPECIAL_HOLIDAY_ID||(cdt[1]||0)!==SPECIAL_HOLIDAY_ID){allH=false;break;}
      }
      colHolidayDays.push(allH);
    }
  }
  var effDayCount=0;
  var availableSlots=0;
  for(var dayIdx=0; dayIdx<sprintDays.length && dayIdx<emp.tasks.length; dayIdx++){
    if(!isEffWorkday(dayIdx))continue;
    if(colHolidayDays[dayIdx])continue;
    if(effDayCount>=BASE_WORKDAYS)break;
    effDayCount++;

    var dt=emp.tasks[dayIdx];
    // On effective workdays we expect an array, but be defensive.
    if(!Array.isArray(dt))dt=[0,0];
    var s0=(dt[0]||0);
    var s1=(dt[1]||0);
    // Slot is AVAILABLE if it's not vacation.
    // We already excluded column-wide holidays above; for individual holidays we also treat
    // it as unavailable.
    if(s0!==SPECIAL_HOLIDAY_ID && s0!==SPECIAL_VACATION_ID)availableSlots++;
    if(s1!==SPECIAL_HOLIDAY_ID && s1!==SPECIAL_VACATION_ID)availableSlots++;
  }

  // Missing effective workdays also reduce availability (because availableSlots won't include them).
  var lossSlots = baselineSlots - availableSlots;
  // Explanation:
  // - availableSlots counts slots in existing effective workdays (up to 10)
  // - if there are fewer than 10 effective workdays, availableSlots is smaller,
  //   so the difference vs baseline becomes the loss.
  if(lossSlots<0)lossSlots=0;
  return lossSlots * 0.05;
}

function taskDisplayNum(tid){
  var idx=(taskIndexById && typeof taskIndexById[tid]==='number')?taskIndexById[tid]:tasks.findIndex(function(t){return t.id===tid});

}

 function makeBlock(tid,weekend){
   var b=document.createElement('div');
   b.setAttribute('data-task',tid);
    if(tid==SPECIAL_HOLIDAY_ID){b.className='block red';}
    else if(tid==SPECIAL_VACATION_ID){b.className='block vac';b.textContent='О';}
    // If a work task is assigned on a weekend, it should look the same as on a workday.
    // Weekend must not introduce a special shade/style for the task block.
    else if(tid>0&&weekend){b.className='block blue';b.textContent=String(taskDisplayNum(tid));b.style.background=getTaskBlueShadeById(tid);}
    else if(tid>0){b.className='block blue';b.textContent=String(taskDisplayNum(tid));b.style.background=getTaskBlueShadeById(tid);}
    else if(weekend){b.className='block red';}
    else{b.className='block green';}
    return b;
  }

  // Grid-only helper: same as makeBlock, but allows choosing an alternate shade
  // (for better separation inside one employee row).
  function makeBlockGrid(tid,weekend,blueVariantIdx){
    var b=makeBlock(tid,weekend);
    // Only override normal task blocks (not vacation/holiday/free/weekend).
    if(tid>0){
      b.style.background=getTaskBlueGridShadeById(tid, blueVariantIdx||0);
    }
    return b;
  }

  // Add visual start/end markers to task blocks inside one employee row.
  // Rules:
  // - Put '›' before number in the first cell of a contiguous run of the same taskId.
  // - Put '‹' after number in the last cell of the run.
  // - If the run length is 1 cell: show both markers: ›N‹.
  // - Do NOT show the task number in the middle cells of a run.
  function applyRowTaskEdgeMarkers(row){
    if(!row)return;
    var blocks=row.querySelectorAll('.day-cell .block');
    if(!blocks || !blocks.length)return;

    // Collect task ids in visual order.
    var tids=[];
    for(var i=0;i<blocks.length;i++){
      var b=blocks[i];
      var tid=parseInt(b.getAttribute('data-task'));
      tids.push(isNaN(tid)?0:tid);
    }

    // When a task spans across a weekend (Fri -> Mon) and weekend cells are empty,
    // we should NOT start a new run on Monday. So for edge detection we skip
    // weekend blocks with tid=0 when looking for previous/next neighbor.
    function findPrevRelevantTid(j){
      for(var k=j-1;k>=0;k--){
        var dayIdx=Math.floor(k/2);
        if(isWeekend && isWeekend[dayIdx]){
          // Ignore empty weekend cells in continuity.
          if(tids[k]===0)continue;
        }
        return tids[k]||0;
      }
      return 0;
    }
    function findNextRelevantTid(j){
      for(var k=j+1;k<blocks.length;k++){
        var dayIdx=Math.floor(k/2);
        if(isWeekend && isWeekend[dayIdx]){
          if(tids[k]===0)continue;
        }
        return tids[k]||0;
      }
      return 0;
    }

    for(var j=0;j<blocks.length;j++){
      var bj=blocks[j];
      var tidj=tids[j];

      // Only for work tasks.
      if(!(tidj>0))continue;

      var prevTid=findPrevRelevantTid(j);
      var nextTid=findNextRelevantTid(j);
      var isStart=(prevTid!==tidj);
      var isEnd=(nextTid!==tidj);

      // Keep original number text from makeBlock()
      var numText=bj.textContent || '';
      // Remove any previously injected edges.
      while(bj.firstChild){bj.removeChild(bj.firstChild);}
      // Show the number:
      // - ONLY in the first cell of a run (start): normal style
      // - in the last cell (end) and middle cells: pale non-bold
      //   (so only the start is visually emphasized)
      if(isStart){
        bj.textContent=numText;
      }else{
        bj.textContent='';
        var mid=document.createElement('span');
        mid.className='mid-task-num';
        mid.textContent=numText;
        bj.appendChild(mid);
      }

      // Add absolutely-positioned edge markers closer to cell edges.
      if(isStart){
        var e1=document.createElement('span');
        e1.className='edge edge-start';
        e1.textContent='›';
        bj.appendChild(e1);
      }
      if(isEnd){
        var e2=document.createElement('span');
        e2.className='edge edge-end';
        e2.textContent='‹';
        bj.appendChild(e2);
      }
    }
  }

function buildEmployeeRow(emp,empIdx){
  var row=document.createElement('div');row.className='sprint-row emp-has-load-bar';row.setAttribute('data-emp',empIdx);
  applyGridColumnTemplate(row);
  row.style.overflow='visible';
  var loadEl=document.createElement('div');loadEl.className='sprint-load';
  var loadNum=document.createElement('span');loadNum.className='sprint-load__num';
  // Near surname show availability loss vs baseline 10 workdays.
  loadNum.textContent=isEmpAllVacation(emp)?'О':calcEmpAvailabilityLoss(emp).toFixed(2);
  var loadBar=document.createElement('div');loadBar.className='emp-load-bar';
  var loadFill=document.createElement('div');loadFill.className='emp-load-bar__fill';loadFill.style.width=calcEmpLoadPercent(emp).toFixed(1)+'%';
  loadBar.appendChild(loadFill);
  loadBar.title='Загрузка: '+calcEmpLoadPercent(emp).toFixed(0)+'%';
  loadEl.appendChild(loadNum);loadEl.appendChild(loadBar);
  row.appendChild(loadEl);
  var nameEl=document.createElement('div');nameEl.className='sprint-name';
  var nameText=document.createElement('span');nameText.className='sprint-name-text';nameText.textContent=emp.name;
  nameEl.appendChild(nameText);
  nameEl.addEventListener('click',function(){toggleEmpHighlight(empIdx)});
  nameEl.addEventListener('dblclick',function(e){
    e.preventDefault();
    var newName=prompt('Фамилия сотрудника:',emp.name);
    if(newName!==null&&newName.trim()){
      pushHistory();
      emp.name=newName.trim();
      rebuildGrid();
      autoSaveToLocalStorage();
    }
  });row.appendChild(nameEl);

  // Grid requirement: in EACH employee row, task runs must ALWAYS alternate
  // between dark and light shades, independent from the bar chart and other rows.
  // A contiguous run of the same taskId keeps its shade.
  // Empty weekend cells (tid=0 on weekend) do NOT break continuity.
  var prevRunTaskId=null;
  var prevRunVariant=0; // 0=dark, 1=light

  for(var i=0;i<sprintDays.length;i++){
    var cell=document.createElement('div');cell.className='day-cell';
    cell.setAttribute('data-emp-idx',empIdx);cell.setAttribute('data-day-idx',i);
    var dt=emp.tasks[i]||[0,0],we=isWeekend[i]&&!(Array.isArray(workingWeekends)&&workingWeekends.indexOf(i)>=0);

    function pickBlueVariantForTask(tid){
      // First run in the row starts with dark.
      if(prevRunTaskId===null){
        prevRunTaskId=tid;
        prevRunVariant=0;
        return prevRunVariant;
      }
      // Same task continues: keep shade.
      if(prevRunTaskId===tid){
        return prevRunVariant;
      }
      // New task run: flip shade.
      prevRunTaskId=tid;
      prevRunVariant=(prevRunVariant===0)?1:0;
      return prevRunVariant;
    }

    // slot 0
    var t0=(dt[0]||0);
    var v0=0;
    if(t0>0){
      v0=pickBlueVariantForTask(t0);
    }else{
      // Do not break continuity on empty weekends.
      if(!(we && t0===0)){
        prevRunTaskId=null;
      }
    }
    cell.appendChild(makeBlockGrid(t0,we,v0));

    // slot 1
    var t1=(dt[1]||0);
    var v1=0;
    if(t1>0){
      v1=pickBlueVariantForTask(t1);
    }else{
      if(!(we && t1===0)){
        prevRunTaskId=null;
      }
    }
    cell.appendChild(makeBlockGrid(t1,we,v1));

    row.appendChild(cell);
  }
  // After blocks are rendered, decorate first/last cells with edge markers.
  applyRowTaskEdgeMarkers(row);
  return row;
}

function normalizeTeamTasksLength(){
  team.forEach(function(emp){
    if(!Array.isArray(emp.tasks))emp.tasks=[];
    if(emp.tasks.length > sprintDays.length){
      emp.tasks = emp.tasks.slice(0, sprintDays.length);
    }
    while(emp.tasks.length < sprintDays.length){
      emp.tasks.push(isWeekend[emp.tasks.length]?null:[0,0]);
    }
    emp.tasks = emp.tasks.map(function(dt){
      // Preserve weekend empties as null (no slots), workdays as [0,0].
      if(dt===null)return null;
      if(!Array.isArray(dt))dt=[];
      return [dt[0]||0, dt[1]||0];
    });
  });
}

function applySprintPeriod(periodText){
  var meta=buildSprintDatesFromHeader(periodText);
  if(!meta)return false;
  sprintMeta=meta;

  isWeekend=meta.map(function(x){return x.dow>=5?1:0});

  rebuildDaysRow();
  recalc();renderBar();rebuildGrid();
  return true;
}

function getPeriodString(){

var periodStartEl=document.getElementById('periodStart');
var periodEndEl=document.getElementById('periodEnd');

  var lastGoodStart=getPeriodControlValue(periodStartEl);
  var lastGoodEnd=getPeriodControlValue(periodEndEl);
  var calendarPopover=document.getElementById('calendarPopover');
  var calendarTarget=null;
  var calendarMonthDate=new Date();
  function applyIfValid(){
    // Reject when end date is earlier than start date.
    var psRaw=getPeriodControlValue(periodStartEl).trim();
    var peRaw=getPeriodControlValue(periodEndEl).trim();
    // Strict format: only DD.MM (leading zeros required).
    // Example: "01.10" is valid, "1.10" is invalid.
    var strictOk=/^\d{2}\.\d{2}$/.test(psRaw) && /^\d{2}\.\d{2}$/.test(peRaw);
    if(!strictOk){
      setPeriodError('Неверная дата');
      return false;
    }
    var mm=String(psRaw+'-'+peRaw).match(/(\d{2})\.(\d{2})-(\d{2})\.(\d{2})/);
    if(mm){
      var y=(new Date()).getFullYear();
      var st=new Date(y, parseInt(mm[2],10)-1, parseInt(mm[1],10));
      var en=new Date(y, parseInt(mm[4],10)-1, parseInt(mm[3],10));
      if(!isNaN(st.getTime()) && !isNaN(en.getTime()) && en.getTime()<st.getTime()){
        setPeriodError('Неверная дата');
        return false;
      }
    }
    setPeriodError('');
    if(applySprintPeriod(null)){
      lastGoodStart=getPeriodControlValue(periodStartEl);
      lastGoodEnd=getPeriodControlValue(periodEndEl);
      autoSaveToLocalStorage();
      return true;
    }
    return false;
  }
  function parseDdmmToDate(value){
    var m=String(value||'').match(/^(\d{2})\.(\d{2})$/);
    var y=(new Date()).getFullYear();
    if(!m)return new Date(y,(new Date()).getMonth(),1);
    var dt=new Date(y,parseInt(m[2],10)-1,parseInt(m[1],10));
    if(isNaN(dt.getTime()))return new Date(y,(new Date()).getMonth(),1);
    return dt;
  }
  function formatDdmmDate(dt){return pad2(dt.getDate())+'.'+pad2(dt.getMonth()+1);}
  function hideCalendar(){
    if(calendarPopover)calendarPopover.hidden=true;
    calendarTarget=null;
  }
  window.__SPRINT_LD_CLOSE_CALENDAR__=function(cancelIt){
    if(!calendarPopover || calendarPopover.hidden)return false;
    var t=calendarTarget;
    var active=document.activeElement;
    if(cancelIt){
      setPeriodControlValue(periodStartEl,lastGoodStart);
      setPeriodControlValue(periodEndEl,lastGoodEnd);
      setPeriodError('');
      applySprintPeriod(null);
    }
    hideCalendar();
    if(active && calendarPopover.contains(active) && active.blur)active.blur();
    if(t && t.blur)t.blur();
    return true;
  };
  window.__SPRINT_LD_ACCEPT_CALENDAR__=function(){
    if(!calendarPopover || calendarPopover.hidden)return false;
    var ok=applyIfValid();
    if(ok){
      var t=calendarTarget;
      hideCalendar();
      if(t && t.blur)t.blur();
    }
    return true;
  };
  function renderCalendar(){
    if(!calendarPopover || !calendarTarget)return;
    var y=calendarMonthDate.getFullYear();
    var m=calendarMonthDate.getMonth();
    var selected=parseDdmmToDate(getPeriodControlValue(calendarTarget));
    var today=new Date();
    var first=new Date(y,m,1);
    var startOffset=(first.getDay()+6)%7;
    var gridStart=new Date(y,m,1-startOffset);
    var monthNames=['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
    calendarPopover.innerHTML='';
    var head=document.createElement('div');head.className='calendar-head';
    var prev=document.createElement('button');prev.type='button';prev.className='calendar-nav';prev.textContent='‹';
    var title=document.createElement('div');title.className='calendar-title';title.textContent=monthNames[m]+' '+y;
    var next=document.createElement('button');next.type='button';next.className='calendar-nav';next.textContent='›';
    head.appendChild(prev);head.appendChild(title);head.appendChild(next);calendarPopover.appendChild(head);
    var week=document.createElement('div');week.className='calendar-week';
    ['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'].forEach(function(d){var s=document.createElement('span');s.textContent=d;week.appendChild(s);});
    calendarPopover.appendChild(week);
    var days=document.createElement('div');days.className='calendar-grid';
    for(var i=0;i<42;i++){
      var dt=new Date(gridStart);dt.setDate(gridStart.getDate()+i);
      var b=document.createElement('button');b.type='button';b.className='calendar-day';b.textContent=String(dt.getDate());
      if(dt.getMonth()!==m)b.classList.add('is-other');
      if(dt.getFullYear()===selected.getFullYear() && dt.getMonth()===selected.getMonth() && dt.getDate()===selected.getDate())b.classList.add('is-selected');
      if(dt.getFullYear()===today.getFullYear() && dt.getMonth()===today.getMonth() && dt.getDate()===today.getDate())b.classList.add('is-today');
      (function(chosen){b.addEventListener('click',function(){pushHistory();setPeriodControlValue(calendarTarget,formatDdmmDate(chosen));hideCalendar();applyIfValid();});})(new Date(dt));
      days.appendChild(b);
    }
    calendarPopover.appendChild(days);
    prev.addEventListener('click',function(){calendarMonthDate=new Date(y,m-1,1);renderCalendar();});
    next.addEventListener('click',function(){calendarMonthDate=new Date(y,m+1,1);renderCalendar();});
  }
  function openCalendarForField(field){
    calendarTarget=field;
    calendarMonthDate=parseDdmmToDate(getPeriodControlValue(field));
    renderCalendar();
    if(calendarPopover){
      var r=field.getBoundingClientRect();
      calendarPopover.style.left=Math.max(8,Math.min(window.innerWidth-246,r.left))+'px';
      calendarPopover.style.top=(r.bottom+8)+'px';
      calendarPopover.hidden=false;
    }
  }
  function onKey(e){
    if(e.key==='Escape'){
      e.preventDefault();
      e.stopPropagation();
      if(window.__SPRINT_LD_CLOSE_CALENDAR__ && window.__SPRINT_LD_CLOSE_CALENDAR__(true))return;
      setPeriodControlValue(periodStartEl,lastGoodStart);
      setPeriodControlValue(periodEndEl,lastGoodEnd);
      setPeriodError('');
      applySprintPeriod(null);
      e.target.blur();
      hideCalendar();
    }
    if(e.key==='Enter'){
      e.preventDefault();

      if(calendarPopover && !calendarPopover.hidden && window.__SPRINT_LD_ACCEPT_CALENDAR__){window.__SPRINT_LD_ACCEPT_CALENDAR__();return;}
      if(e.target===periodStartEl)openCalendarForField(periodStartEl);
      if(e.target===periodEndEl)openCalendarForField(periodEndEl);
    }
    if(e.key===' '){
      e.preventDefault();
      e.stopPropagation();
      if(e.target===periodStartEl)openCalendarForField(periodStartEl);
      if(e.target===periodEndEl)openCalendarForField(periodEndEl);
    }
  }
  periodStartEl.addEventListener('click', function(){openCalendarForField(periodStartEl);});
  periodEndEl.addEventListener('click', function(){openCalendarForField(periodEndEl);});
  periodStartEl.addEventListener('keydown', onKey);
  periodEndEl.addEventListener('keydown', onKey);
  document.addEventListener('mousedown',function(e){
    if(!calendarPopover || calendarPopover.hidden)return;
    if(calendarPopover.contains(e.target) || e.target===periodStartEl || e.target===periodEndEl)return;
    hideCalendar();
  });
  // IMPORTANT (source file): do not persist dates across reloads.
}

function sanitizeFileName(s){
  return String(s||'').replace(/\s+/g,'').replace(/[^0-9A-Za-z._-]/g,'_');
}

function pad2(n){
  var s=String(n||0);
  return (s.length>=2)?s:('0'+s);
}

function getSprintPeriodFilePrefix(period){
  var m=String(period||'').trim().match(/^(\d{2})\.(\d{2})-(\d{2})\.(\d{2})$/);
  if(!m)return '';
  var now=new Date();
  var y=now.getFullYear();
  var d1=parseInt(m[1],10), mo1=parseInt(m[2],10);
  var d2=parseInt(m[3],10), mo2=parseInt(m[4],10);
  var st=new Date(y, mo1-1, d1);
  var en=new Date(y, mo2-1, d2);
  if(isNaN(st.getTime()) || isNaN(en.getTime()))return '';
  if(en.getTime()<st.getTime())en=new Date(y+1, mo2-1, d2);
  function fmt(dt){
    return pad2(dt.getFullYear()%100)+'.'+pad2(dt.getMonth()+1)+'.'+pad2(dt.getDate());
  }
  return fmt(st)+'-'+fmt(en);
}

function buildTitleSnapshot(titleEl){
  return Promise.resolve().then(function(){
    if(!titleEl)return null;

    // Wait for fonts when supported (Safari-safe: do not use async/await syntax).
    var fontsReady=(document.fonts && document.fonts.ready)?document.fonts.ready:null;
    if(fontsReady && typeof fontsReady.then==='function'){
      return fontsReady.catch(function(){return null;}).then(function(){return titleEl;});
    }
    return titleEl;
  }).then(function(el){
    if(!el)return null;

    var text=(el.textContent||'').trim();
    if(!text)return null;

    var styles=getComputedStyle(el);
    var fontSize=parseFloat(styles.fontSize)||32;
    var fontWeight=styles.fontWeight||'700';
    var fontFamily=styles.fontFamily||getComputedStyle(document.body).fontFamily||'system-ui';
    var font=fontWeight+' '+fontSize+'px '+fontFamily;

    var measure=document.createElement('canvas');
    var mctx=measure.getContext('2d');
    mctx.font=font;
    var metrics=mctx.measureText(text);
    var padX=2;
    var width=Math.max(1,Math.ceil((metrics.width||0)+(padX*2)));
    var height=40;

    var dpr=Math.max(1,Math.ceil(window.devicePixelRatio||1));
    var c=document.createElement('canvas');
    c.width=width*dpr;
    c.height=height*dpr;
    var ctx=c.getContext('2d');
    ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,width,height);
    ctx.font=font;
    ctx.textBaseline='alphabetic';
    ctx.textAlign='left';

    var grad=ctx.createLinearGradient(0,0,width,0);
    grad.addColorStop(0,'#2a7851');
    grad.addColorStop(1,'#2567c9');
    ctx.fillStyle=grad;
    ctx.fillText(text,padX,30);

    return {src:c.toDataURL('image/png'),width:width,height:height,alt:text};
  }).catch(function(){
    return null;
  });
}

function _parseCssLengthPx(v, basePx){
  if(!v || v==='normal')return 0;
  var s=String(v).trim();
  if(!s)return 0;
  var n=parseFloat(s);
  if(!isFinite(n))return 0;
  if(/px$/i.test(s))return n;
  if(/em$/i.test(s))return n*(basePx||0);
  if(/rem$/i.test(s)){
    try{
      var rootSize=parseFloat(getComputedStyle(document.documentElement).fontSize)||16;
      return n*rootSize;
    }catch(e){return n*(basePx||0);}
  }
  // Fallback: treat number-like values as px
  return n;
}

function overlayGradientTitleOnCanvas(canvas, info){
  if(!canvas || !info || !info.text)return;
  // If we decide to keep a plain DOM-rendered title (white) for screenshot
  // to guarantee perfect DOM placement, skip post-processing overlay.
  if(info.forcePlainTitle)return;
  var ctx=canvas.getContext('2d');
  if(!ctx)return;

  var scaleX=info.scaleX||info.scale||1;
  var scaleY=info.scaleY||info.scale||1;
  // Use element rect for background + clipping, but range rect for glyph placement.
  // This matches the browser's actual rendered glyph box most closely.
  var x=(((info.x||0))*scaleX);
  var y=(((info.y||0))*scaleY);
  var w=(((info.w||0))*scaleX);
  var h=(((info.h||0))*scaleY);
  if(w<=0 || h<=0)return;

  ctx.save();
  // Restore header background (covers any html2canvas gradient-rectangle artifacts).
  ctx.fillStyle=info.bg||'#20282b';
  ctx.fillRect(x,y,w,h);

  // Hard guarantee: never draw outside the measured title box.
  // This prevents any overflow/clipping surprises from font metrics.
  ctx.beginPath();
  ctx.rect(x,y,w,h);
  ctx.clip();

  var fontWeight=info.fontWeight||'700';
  var fontFamily=info.fontFamily||'system-ui';
  var fontSizePx=((info.fontSize||32)*scaleY);
  var letterSpacingPx=((info.letterSpacing||0)*scaleX);
  var paddingLeftPx=((info.paddingLeft||0)*scaleX);
  var paddingRightPx=((info.paddingRight||0)*scaleX);
  var paddingTopPx=((info.paddingTop||0)*scaleY);
  var paddingBottomPx=((info.paddingBottom||0)*scaleY);
  var lineHeightBase=(info.lineHeight && info.lineHeight>0)?info.lineHeight:(info.fontSize||32)*1.2;
  var lineHeightPx=(lineHeightBase*scaleY);

  function setFont(sz){
    ctx.font=fontWeight+' '+Math.max(1,sz)+'px '+fontFamily;
  }

  function measureTextWidth(text){
    if(!letterSpacingPx){
      return ctx.measureText(text).width;
    }
    var sum=0;
    for(var i=0;i<text.length;i++){
      sum+=ctx.measureText(text[i]).width;
      if(i<text.length-1)sum+=letterSpacingPx;
    }
    return sum;
  }

  // Fit-to-box: if our computed text would overflow the measured title rect,
  // downscale font size (and letter spacing / line-height) for the screenshot only.
  var fitPad=2*scaleX;
  var innerX=x + paddingLeftPx;
  var innerY=y + paddingTopPx;
  var innerW=Math.max(1, w - paddingLeftPx - paddingRightPx);
  var innerH=Math.max(1, h - paddingTopPx - paddingBottomPx);
  var maxW=Math.max(1, innerW - fitPad);
  var maxH=Math.max(1, innerH - fitPad);

  setFont(fontSizePx);
  var sample=ctx.measureText(info.text||'Mg');
  // For fit we can use fontBoundingBox (stable across glyphs) when available.
  var ascent0=(sample.fontBoundingBoxAscent!=null?sample.fontBoundingBoxAscent:(sample.actualBoundingBoxAscent!=null?sample.actualBoundingBoxAscent:fontSizePx*0.8));
  var descent0=(sample.fontBoundingBoxDescent!=null?sample.fontBoundingBoxDescent:(sample.actualBoundingBoxDescent!=null?sample.actualBoundingBoxDescent:fontSizePx*0.2));
  var textH0=ascent0+descent0;
  var textW0=measureTextWidth(info.text);

  var fitScale=1;
  if(textW0>maxW){
    fitScale=Math.min(fitScale, maxW/textW0);
  }
  if(textH0>maxH){
    fitScale=Math.min(fitScale, maxH/textH0);
  }

  if(fitScale<0.999){
    fontSizePx=Math.max(1, fontSizePx*fitScale);
    letterSpacingPx=letterSpacingPx*fitScale;
    lineHeightPx=Math.max(1, lineHeightPx*fitScale);
    setFont(fontSizePx);
  }

  ctx.textBaseline='alphabetic';
  ctx.textAlign='left';

  var m=ctx.measureText(info.text||'Mg');
  // For positioning, prefer actualBoundingBox (matches visible glyph bounds better).
  var ascent=(m.actualBoundingBoxAscent!=null?m.actualBoundingBoxAscent:(m.fontBoundingBoxAscent!=null?m.fontBoundingBoxAscent:fontSizePx*0.8));
  var descent=(m.actualBoundingBoxDescent!=null?m.actualBoundingBoxDescent:(m.fontBoundingBoxDescent!=null?m.fontBoundingBoxDescent:fontSizePx*0.2));
  var metricH=ascent+descent;
  // Match browser line box placement: contentTop + leading/2 + ascent.
  // leading = lineHeight - metricHeight (approx).
  var baseline=(innerY + (innerH - lineHeightPx)/2 + (lineHeightPx - metricH)/2 + ascent);

  var grad=ctx.createLinearGradient(x,0,x+w,0);
  grad.addColorStop(0, info.colorA||'#2a7851');
  grad.addColorStop(1, info.colorB||'#2567c9');
  ctx.fillStyle=grad;

  // If we have range rect, align the glyph box to the browser's glyph box.
  // - Horizontal: align glyph-left using actualBoundingBoxLeft
  // - Vertical: align glyph-top using actualBoundingBoxAscent
  if(info.rangeX!=null && info.rangeY!=null && isFinite(info.rangeX) && isFinite(info.rangeY)){
    var targetGlyphLeft=(info.rangeX*scaleX);
    var targetGlyphTop=(info.rangeY*scaleY);
    var glyphLeft=(m.actualBoundingBoxLeft!=null?m.actualBoundingBoxLeft:0);
    var glyphAscent=(m.actualBoundingBoxAscent!=null?m.actualBoundingBoxAscent:ascent);
    var glyphW=(info.rangeW!=null && isFinite(info.rangeW))?(info.rangeW*scaleX):null;
    if(glyphW && glyphW>0){
      var grad2=ctx.createLinearGradient(targetGlyphLeft,0,targetGlyphLeft+glyphW,0);
      grad2.addColorStop(0, info.colorA||'#2a7851');
      grad2.addColorStop(1, info.colorB||'#2567c9');
      ctx.fillStyle=grad2;
    }
    var curX=targetGlyphLeft - glyphLeft;
    var baseline=targetGlyphTop + glyphAscent;

    if(!letterSpacingPx){
      ctx.fillText(info.text, curX, baseline);
      ctx.restore();
      return;
    }
    for(var k=0;k<info.text.length;k++){
      var ch2=info.text[k];
      ctx.fillText(ch2, curX, baseline);
      curX+=ctx.measureText(ch2).width + letterSpacingPx;
    }
    ctx.restore();
    return;
  }

  // Draw with letter-spacing support (canvas has no native letterSpacing).
  // Do not add extra horizontal offset; match DOM placement.
  var curX=innerX;
  if(!letterSpacingPx){
    ctx.fillText(info.text, curX, baseline);
  }else{
    for(var j=0;j<info.text.length;j++){
      var ch=info.text[j];
      ctx.fillText(ch, curX, baseline);
      curX+=ctx.measureText(ch).width + letterSpacingPx;
    }
  }

  ctx.restore();
}

function isSavedCopy(){
  if(!!window.__SPRINT_LD_IS_COPY__)return true;
  // IMPORTANT: window.__SPRINT_LD_STATE__ can be present in the *source* dashboard.html
  // (preloaded offline state). Do not treat that alone as a "saved copy".
  try{
    var n0=getCurrentHtmlFileName();
    if(n0 && n0.toLowerCase()==='dashboard.html')return false;
  }catch(e){void e;}
  if(!!window.__SPRINT_LD_STATE__)return true;
  // Fallback: if for some reason state injection failed, treat saved copy by filename.
  try{
    var name=getCurrentHtmlFileName();
    if(!name)return false;
    if(name.toLowerCase()==='dashboard.html')return false;
    // current naming
    if(/_dash_v\d{2}\.html$/i.test(name))return true;
    // legacy naming
    if(/_dash_\d{2}\.html$/i.test(name))return true;
    // generic: any html that looks like a dash copy
    if(/_dash/i.test(name) && /\.html$/i.test(name))return true;
    return false;
  }catch(e){
    return false;
  }
}

function updateSaveButtonLabel(){
  var b=document.getElementById('saveBtn');
  if(!b)return;
  b.title=isSavedCopy()?'Пересохранить':'Сохранить копию';

  var resetBtn=document.getElementById('resetBtn');
  if(resetBtn){
    resetBtn.style.display=isSavedCopy()?'none':'';
  }
}

function getCurrentHtmlFileName(){
  try{
    var p=String(location.pathname||'');
    if(!p)return '';
    p=p.split('?')[0].split('#')[0];
    // Use last path segment (works for both http:// and file://)
    var parts=p.split('/').filter(function(x){return !!x});
    var name=parts.length?parts[parts.length-1]:'';
    try{name=decodeURIComponent(name);}catch(e){void e;}
    if(!name)return '';
    if(!/\.html$/i.test(name))return '';
    return name;
  }catch(e){
    return '';
  }
}

function pickNextVersionedDashFileName(period){
  var prefix=getSprintPeriodFilePrefix(period) || sanitizeFileName(period);
  var base=sanitizeFileName(prefix)+'_v';
  // Use per-period counter to always create a new version.
  try{
    var key='SPRINT_LD_SAVE_VER_'+sanitizeFileName(prefix);
    var cur=parseInt(localStorage.getItem(key)||'0',10);
    if(!cur || cur<0)cur=0;
    cur+=1;
    localStorage.setItem(key, String(cur));
    return base+cur+'.html';
  }catch(e){
    return base+'1.html';
  }
}

function buildSaveHtml(){
  var period=getPeriodString();
  var state={
    period: period,
    periodStart: getPeriodControlValue(document.getElementById('periodStart')).trim(),
    periodEnd: getPeriodControlValue(document.getElementById('periodEnd')).trim(),
    tasks: tasks,
    team: team,
    isWeekend: isWeekend,
    workingWeekends: workingWeekends,
    sprintDays: sprintDays,
    sprintDates: sprintDates
  };
  // IMPORTANT: state is injected into a <script> tag. Ensure the JSON does not
  // accidentally terminate the script element (avoid embedding the closing tag sequence).
  var stateJson=JSON.stringify(state);
  // Escape any closing tags. Split pattern to avoid embedding a literal closing script tag in the HTML.
  stateJson=stateJson.replace(/<\//g,'<\\/');
  stateJson=stateJson.replace(new RegExp('<'+'/'+'script', 'gi'), '<\\/'+'script');
  // Emit a real closing script tag in the saved HTML (split to avoid "</script" literal).
  var stateScript='<script>'+
    'window.__SPRINT_LD_STATE__='+stateJson+';'+
    'window.__SPRINT_LD_IS_COPY__=true;'+
    '</'+'script>\n';
  var html=document.documentElement.outerHTML;
  // Remove any previously injected state scripts to avoid duplication
  var reState=new RegExp('<script>\\s*window\\.__SPRINT_LD_STATE__=[\\s\\S]*?<'+ '\\/' + 'script>\\s*', 'gi');
  html=html.replace(reState, '');
  // Inject state before the first script tag (head or body)
  if(/<script\b/i.test(html)){
    html=html.replace(/<script\b/i, stateScript+'<script');
  }else{
    // extremely defensive fallback
    html=html.replace(/<\/body>/i, stateScript+'</body>');
  }
  return {html: html, period: period};
}

function downloadHtmlCopy(blob,fileName){
  return new Promise(function(resolve,reject){
    try{
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url;
      a.download=fileName;
      a.style.display='none';
      document.body.appendChild(a);
      a.click();
      setTimeout(function(){
        try{document.body.removeChild(a);}catch(e){void e;}
        try{URL.revokeObjectURL(url);}catch(e2){void e2;}
        resolve({method:'download'});
      },0);
    }catch(e){
      reject(e);
    }
  });
}

function writeHtmlCopyToDirectory(blob,fileName){
  if(!window.showDirectoryPicker)return Promise.reject(new Error('showDirectoryPicker unavailable'));
  return window.showDirectoryPicker({id:'sprint-ld-save-folder',mode:'readwrite'}).then(function(dirHandle){
    return dirHandle.getFileHandle(fileName,{create:true}).then(function(fileHandle){
      return fileHandle.createWritable().then(function(writable){
        return writable.write(blob).then(function(){
          return writable.close();
        }).catch(function(writeErr){
          try{
            return writable.abort().catch(function(){return null;}).then(function(){throw writeErr;});
          }catch(abortErr){
            throw writeErr;
          }
        });
      });
    });
  }).then(function(){
    return {method:'directory'};
  });
}

function writeHtmlCopyWithSavePicker(blob,fileName){
  if(!window.showSaveFilePicker)return Promise.reject(new Error('showSaveFilePicker unavailable'));
  return window.showSaveFilePicker({
    suggestedName:fileName,
    types:[{description:'HTML',accept:{'text/html':['.html']}}]
  }).then(function(fileHandle){
    return fileHandle.createWritable().then(function(writable){
      return writable.write(blob).then(function(){
        return writable.close();
      }).catch(function(writeErr){
        try{
          return writable.abort().catch(function(){return null;}).then(function(){throw writeErr;});
        }catch(abortErr){
          throw writeErr;
        }
      });
    });
  }).then(function(){
    return {method:'save-picker'};
  });
}

function getSprintLdSaveToken(){
  try{
    var m=String(document.cookie||'').match(/(?:^|;\s*)SPRINT_LD_TOKEN=([^;]+)/);
    return m?decodeURIComponent(m[1]):'';
  }catch(e){
    return '';
  }
}

function saveHtmlCopyViaServer(html,fileName){
  if(location.protocol!=='http:' && location.protocol!=='https:'){
    return Promise.reject(new Error('local save server unavailable from file://'));
  }
  var token=getSprintLdSaveToken();
  if(!token){
    return Promise.reject(new Error('missing local save token'));
  }
  return fetch('/api/save-html',{
    method:'POST',
    headers:{
      'Content-Type':'application/json; charset=utf-8',
      'X-Sprint-LD-Token':token
    },
    body:JSON.stringify({filename:fileName,html:html})
  }).then(function(res){
    if(!res || !res.ok){
      return (res?res.text():Promise.resolve('')).then(function(t){
        throw new Error('server save failed: '+(res?res.status:'no response')+(t?(' '+t):''));
      });
    }
    return res.json();
  }).then(function(data){
    if(!data || !data.ok){
      throw new Error((data&&data.error)||'server save failed');
    }
    return {method:'server',filename:data.filename||fileName,url:data.url||''};
  });
}

function saveCopy(){
  var sb=document.getElementById('saveBtn');
  var payload=null;
  var fileName='';
  try{
    payload=buildSaveHtml();
    if(!payload || !payload.period){
      if(sb){sb.title='Заполните даты';sb.style.borderColor='var(--accent-red)';setTimeout(function(){updateSaveButtonLabel();sb.style.borderColor='';},5000);}
      return Promise.resolve(null);
    }
    fileName=pickNextVersionedDashFileName(payload.period);
  }catch(e0){
    try{console.error('Save failed:',e0);}catch(_e0){void _e0;}
    if(sb){sb.title='Ошибка: '+(e0&&e0.message?e0.message:String(e0));sb.style.borderColor='var(--accent-red)';setTimeout(function(){updateSaveButtonLabel();sb.style.borderColor='';},5000);}
    return Promise.resolve(null);
  }

  var blob=new Blob([payload.html],{type:'text/html;charset=utf-8'});
  var savePromise=saveHtmlCopyViaServer(payload.html,fileName).catch(function(serverErr){
    try{console.warn('Local save server unavailable, falling back to browser save:',serverErr);}catch(_e1){void _e1;}
    if(window.showDirectoryPicker){
      return writeHtmlCopyToDirectory(blob,fileName);
    }else if(window.showSaveFilePicker){
      return writeHtmlCopyWithSavePicker(blob,fileName);
    }
    return downloadHtmlCopy(blob,fileName);
  });

  return savePromise.then(function(result){
    if(sb){
      var savedName=(result&&result.filename)?result.filename:fileName;
      var prefix=(result&&result.method==='download')?'Скачано: ':'Сохранено: ';
      sb.title=prefix+savedName;
      setTimeout(function(){updateSaveButtonLabel();},5000);
    }
    return true;
  }).catch(function(e){
    if(e && e.name==='AbortError'){
      if(sb){sb.title='Сохранение отменено';setTimeout(function(){updateSaveButtonLabel();},3000);}
      return null;
    }
    if(window.showDirectoryPicker || window.showSaveFilePicker){
      return downloadHtmlCopy(blob,fileName).then(function(){
        if(sb){sb.title='Скачано: '+fileName;setTimeout(function(){updateSaveButtonLabel();},5000);}
        return true;
      }).catch(function(downloadErr){
        try{console.error('Save failed:',downloadErr);}catch(_e5){void _e5;}
        if(sb){sb.title='Ошибка: '+(downloadErr&&downloadErr.message?downloadErr.message:String(downloadErr));sb.style.borderColor='var(--accent-red)';setTimeout(function(){updateSaveButtonLabel();sb.style.borderColor='';},5000);}
        return null;
      });
    }
    try{console.error('Save failed:',e);}catch(_e6){void _e6;}
    if(sb){sb.title='Ошибка: '+(e&&e.message?e.message:String(e));sb.style.borderColor='var(--accent-red)';setTimeout(function(){updateSaveButtonLabel();sb.style.borderColor='';},5000);}
    return null;
  });
}

if(saveBtn){

var resetBtn=document.getElementById('resetBtn');
if(resetBtn){
  resetBtn.addEventListener('click', function(){
    clearAutoSave();
