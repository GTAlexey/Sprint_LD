}

updateSaveButtonLabel();

updateEmpButton();

var assignMode=null;
var paintTaskId=null;
var paintSnapshot=null;

function isCalendarPopoverOpen(){
  var cp=document.getElementById('calendarPopover');
  return !!(cp && !cp.hidden);
}
function closeCalendarPopoverByKeyboard(cancelIt){
  if(!isCalendarPopoverOpen())return false;
  if(window.__SPRINT_LD_CLOSE_CALENDAR__)return window.__SPRINT_LD_CLOSE_CALENDAR__(cancelIt);
  var cp=document.getElementById('calendarPopover');
  if(cp)cp.hidden=true;
  return true;
}
function acceptCalendarPopoverByKeyboard(){
  if(!isCalendarPopoverOpen())return false;
  if(window.__SPRINT_LD_ACCEPT_CALENDAR__)return window.__SPRINT_LD_ACCEPT_CALENDAR__();
  var cp=document.getElementById('calendarPopover');
  if(cp)cp.hidden=true;
  return true;
}

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    e.preventDefault();
    if(closeCalendarPopoverByKeyboard(true))return;
    if(isAddTaskPending() || e.target===addInput){cancelAddTaskInput(true);return;}
    // Cancel pending single-click highlight (uses a timer)
    if(slotClickTimer){clearTimeout(slotClickTimer);slotClickTimer=null;slotClickBlock=null;}
    if(paintTaskId!==null&&paintSnapshot){restorePaintSnapshot();removeHighlight();clearAssignMode();return}
    clearAllHighlights();
    return;
  }
  if(e.key==='Enter'){
    var cp=document.getElementById('calendarPopover');
    if(cp && cp.contains(e.target))return;
    if(e.target===document.getElementById('periodStart') || e.target===document.getElementById('periodEnd'))return;
    if(acceptCalendarPopoverByKeyboard()){e.preventDefault();return;}
    if(isAddTaskPending() || e.target===addInput){e.preventDefault();addNewTask();return;}
    if(!isEditableTarget(e.target)&&paintTaskId!==null){e.preventDefault();commitPaint();clearAssignMode();return;}
  }
});

function savePaintSnapshot(){
  // Preserve weekend markers (null) safely
  paintSnapshot=team.map(function(emp){
    return emp.tasks.map(function(dt){
      return Array.isArray(dt)?dt.slice():null;
    });
  });
}
function restorePaintSnapshot(){
  if(!paintSnapshot)return;
  team.forEach(function(emp,i){
    emp.tasks=paintSnapshot[i].map(function(dt){
      return Array.isArray(dt)?dt.slice():null;
    });
  });
  paintSnapshot=null;
  recalc();renderBar();rebuildGrid();
}
function commitPaint(){
  paintSnapshot=null;
  removeHighlight();
  autoSaveToLocalStorage();
}

function clearAssignMode(){
  if(assignMode){
    var old=document.querySelector('.block.assign-target');
    if(old)old.classList.remove('assign-target');
    assignMode=null;
    document.querySelectorAll('.task-item').forEach(function(el){el.classList.remove('assign-available','assign-current')});
    document.querySelectorAll('.special-btn').forEach(function(el){el.classList.remove('assign-available','assign-current')});
  }
}

var slotClickTimer=null;
var slotClickBlock=null;

document.querySelector('.sprint-rows').addEventListener('click',function(e){
  var block=e.target.closest('.block');
  if(!block){clearAssignMode();if(slotClickTimer){clearTimeout(slotClickTimer);slotClickTimer=null;}return;}
  if(assignMode){clearAssignMode();return;}
  if(e.detail>1)return;
  if(paintTaskId!==null){
    var cell=block.closest('.day-cell');if(!cell)return;
    var empIdx=parseInt(cell.getAttribute('data-emp-idx'));
    var dayIdx=parseInt(cell.getAttribute('data-day-idx'));
    var slotIdx=Array.from(cell.querySelectorAll('.block')).indexOf(block);
    var savedPaint=paintTaskId;
    var currentTid=parseInt(block.getAttribute('data-task'));
    var toggleTid=(currentTid===savedPaint)?0:savedPaint;
    assignSlot(empIdx,dayIdx,slotIdx,toggleTid);
    activeTaskId=savedPaint;paintTaskId=savedPaint;
    applyHighlight(savedPaint);
    return;
  }
  if(slotClickTimer){clearTimeout(slotClickTimer);slotClickTimer=null;}
  slotClickBlock=block;
  slotClickTimer=setTimeout(function(){
    slotClickTimer=null;
    if(!slotClickBlock)return;
    var tid=parseInt(slotClickBlock.getAttribute('data-task'));
    if(tid>0)toggleHighlight(tid);
    else if(slotClickBlock.classList.contains('green'))toggleHighlight(SPECIAL_FREE_ID);
    slotClickBlock=null;
  },300);
});

function openAssignOnBlock(block){
  if(slotClickTimer){clearTimeout(slotClickTimer);slotClickTimer=null;slotClickBlock=null;}
  clearAssignMode();
  removeHighlight();paintSnapshot=null;paintTaskId=null;
  activeEmpIdx=null;
  document.querySelectorAll('.sprint-rows .block').forEach(function(b){b.classList.remove('dimmed','highlighted')});
  document.querySelectorAll('.task-item').forEach(function(el){el.classList.remove('active','dimmed','assign-available','assign-current')});
  document.querySelectorAll('.special-btn').forEach(function(el){el.classList.remove('active','dimmed','assign-available','assign-current')});
  document.querySelectorAll('.sprint-name').forEach(function(n){n.classList.remove('active','dimmed')});
  document.querySelectorAll('.sprint-load').forEach(function(l){l.classList.remove('dimmed')});
  resetBarHighlight();
  updateEmpButton();

  var cell=block.closest('.day-cell');if(!cell)return;
  var empIdx=parseInt(cell.getAttribute('data-emp-idx'));
  var dayIdx=parseInt(cell.getAttribute('data-day-idx'));
  var slotIdx=Array.from(cell.querySelectorAll('.block')).indexOf(block);
  var currentTid=parseInt(block.getAttribute('data-task'));
  block.classList.add('assign-target');
  assignMode={empIdx:empIdx,dayIdx:dayIdx,slotIdx:slotIdx};

  document.querySelectorAll('.task-item').forEach(function(el){
    var tid=parseInt(el.getAttribute('data-task-id'));
    el.classList.remove('active','dimmed','assign-available','assign-current');
    if(currentTid>0&&tid===currentTid)el.classList.add('assign-current');
    else el.classList.add('assign-available');
  });

  // Special buttons: assign-available/assign-current based on currentTid
  var vacBtn=document.getElementById('btnVacation');
  var holBtn=document.getElementById('btnHoliday');
  var freeBtn=document.getElementById('btnFree');
  [vacBtn,holBtn,freeBtn].filter(function(x){return !!x;}).forEach(function(b){b.classList.remove('assign-available','assign-current')});
  if(currentTid===SPECIAL_VACATION_ID)vacBtn.classList.add('assign-current');
  else vacBtn.classList.add('assign-available');
  if(currentTid===SPECIAL_HOLIDAY_ID)holBtn.classList.add('assign-current');
  else holBtn.classList.add('assign-available');
  if(currentTid===0)freeBtn.classList.add('assign-current');
  else freeBtn.classList.add('assign-available');
}

document.querySelector('.sprint-rows').addEventListener('dblclick',function(e){
  var block=e.target.closest('.block');if(!block)return;
  openAssignOnBlock(block);
});

function assignSlot(empIdx,dayIdx,slotIdx,taskId){
  pushHistory();
  var emp=team[empIdx];
  var dt=emp.tasks[dayIdx];
  if(!Array.isArray(dt))dt=[];
  dt=[dt[0]||0, dt[1]||0];
  dt[slotIdx]=(taskId===0?0:taskId);
  emp.tasks[dayIdx]=dt;
  // IMPORTANT: assigning tasks should not change grid layout widths.
  // Keep the current name column width to avoid horizontal shrink/jitter.
  recalc();renderBar();renderTaskList();updateTaskColumns();rebuildGrid({preserveNameColWidth:true});
  autoSaveToLocalStorage();
}

function addEmployee(){
  var name=prompt('Фамилия нового сотрудника:','');
  if(!name||!name.trim())return;
  pushHistory();
  // Initialize tasks: empty for weekends, [0,0] for workdays (inherit weekend pattern from isWeekend)
  var newTasks=sprintDays.map(function(_,idx){return isWeekend[idx]?null:[0,0]});
  team.push({name:name.trim(),tasks:newTasks});
  departments=[{name:'',members:team}];
  recalc();renderBar();rebuildGrid();updateTaskColumns();
  // Persist changes so refresh keeps the roster.
  autoSaveToLocalStorage();
  saveRosterToLocalStorage();
}

function deleteEmployee(empIdx){
  if(!Array.isArray(team)||empIdx<0||empIdx>=team.length)return;
  pushHistory();
  team.splice(empIdx,1);
  departments=[{name:'',members:team}];
  if(activeEmpIdx===empIdx)activeEmpIdx=null;
  else if(activeEmpIdx!==null&&activeEmpIdx>empIdx)activeEmpIdx--;
  recalc();renderBar();rebuildGrid();updateTaskColumns();
  autoSaveToLocalStorage();
  updateEmpButton();
  saveRosterToLocalStorage();
}

function rebuildGrid(opts){
  opts=opts||{};
  normalizeTasks();
  rebuildTaskIndexById();
  rowsContainer.innerHTML='';
  if(!Array.isArray(team) || team.length===0){
    renderPlaceholderGrid();
    return;
  }
  team.sort(function(a,b){return safeLocaleCompare(a.name||'', b.name||'', 'ru')});
  normalizeTeamTasksLength();
  team.forEach(function(emp){rowsContainer.appendChild(buildEmployeeRow(emp,team.indexOf(emp)))});

  // After rows are rendered, resize the name column to fit the longest surname.
  // During assignment re-renders preserve existing widths so employee bars do not jump.
  if(!opts.preserveNameColWidth){
    recomputeGridNameColumnWidth();
  }
  applyGridTemplatesToAllRows();
  scheduleEmpLoadBarWidthSync();

  // Mark rows where surname wraps to a 2nd line.
  // For those rows we keep top alignment; otherwise we center vertically.
  document.querySelectorAll('.sprint-row').forEach(function(r){
    r.classList.remove('wrapped');
    var nameEl=r.querySelector('.sprint-name');
    if(!nameEl)return;
    // If element is taller than one line-height, it wrapped.
    var textEl=nameEl.querySelector('.sprint-name-text')||nameEl;
    if(textEl.clientHeight > 18){
      r.classList.add('wrapped');
    }
  });
}

function highlightBar(taskId){
  if(!maxBlocks || maxBlocks<=0)return;
  document.querySelectorAll('.stacked-seg').forEach(function(seg){
    var sid=parseInt(seg.getAttribute('data-seg-id'));
    if(sid===taskId){seg.classList.remove('dimmed');seg.classList.add('highlighted')}
    else{seg.classList.remove('highlighted');seg.classList.add('dimmed')}
  });
}
function resetBarHighlight(){document.querySelectorAll('.stacked-seg').forEach(function(seg){seg.classList.remove('dimmed','highlighted')})}
function highlightBarForEmp(ids){
  if(!maxBlocks || maxBlocks<=0)return;
  document.querySelectorAll('.stacked-seg').forEach(function(seg){
    var sid=parseInt(seg.getAttribute('data-seg-id'));
    if(ids[sid]){seg.classList.remove('dimmed');seg.classList.add('highlighted')}
    else{seg.classList.remove('highlighted');seg.classList.add('dimmed')}
  });
}

function getInvolvedEmps(taskId){
  var isFree=taskId===SPECIAL_FREE_ID;var isHoliday=taskId===SPECIAL_HOLIDAY_ID;
  var isVac=taskId===SPECIAL_VACATION_ID;
  var involved={};
  team.forEach(function(emp,idx){
    var found=false;
    emp.tasks.forEach(function(dt,dayIdx){
      if(isFree){
        if(!isWeekend[dayIdx] && Array.isArray(dt) && ((dt[0]||0)===0 || (dt[1]||0)===0))found=true;
      }
      else if(isHoliday){
        if(isWeekend[dayIdx]){found=true;}
        else if(Array.isArray(dt) && dt.indexOf(SPECIAL_HOLIDAY_ID)>=0){found=true;}
      }
      else if(isVac){
        if(Array.isArray(dt) && dt.indexOf(SPECIAL_VACATION_ID)>=0)found=true;
      }
      else{
        if(!Array.isArray(dt))return;
        dt.forEach(function(tid){if(tid===taskId)found=true});
      }
    });
    if(found)involved[idx]=true;
  });
  return involved;
}

function applyHighlight(taskId){
  var isFree=taskId===SPECIAL_FREE_ID;var isHoliday=taskId===SPECIAL_HOLIDAY_ID;var isVac=taskId===SPECIAL_VACATION_ID;
  var involved=getInvolvedEmps(taskId);
  var allB=document.querySelectorAll('.sprint-rows .block'),allI=document.querySelectorAll('.task-item');

  allI.forEach(function(el){
    var tid=parseInt(el.getAttribute('data-task-id'));
    var match;
    if(isFree)match=(tid===0);
    else if(isHoliday)match=(tid==SPECIAL_HOLIDAY_ID);
    else if(isVac)match=(tid==SPECIAL_VACATION_ID);
    else match=(tid===taskId);
    if(match){el.classList.add('active');el.classList.remove('dimmed')}else{el.classList.remove('active');el.classList.add('dimmed')}
  });

  // Style special buttons to match highlight state
  var vacBtn=document.getElementById('btnVacation');
  var holBtn=document.getElementById('btnHoliday');
  var freeBtn=document.getElementById('btnFree');
  [vacBtn,holBtn,freeBtn].filter(function(x){return !!x;}).forEach(function(b){b.classList.remove('active','dimmed')});
  if(vacBtn){if(isVac)vacBtn.classList.add('active');else vacBtn.classList.add('dimmed');}
  if(holBtn){if(isHoliday)holBtn.classList.add('active');else holBtn.classList.add('dimmed');}
  if(freeBtn){if(isFree)freeBtn.classList.add('active');else freeBtn.classList.add('dimmed');}
  allB.forEach(function(b){
    var bt=parseInt(b.getAttribute('data-task'));
    var match;
    if(isFree)match=(bt===0&&b.classList.contains('green'));
    else if(isHoliday)match=b.classList.contains('red');
    else if(isVac)match=b.classList.contains('vac');
    else match=(bt===taskId);
    if(match){b.classList.remove('dimmed');b.classList.add('highlighted')}else{b.classList.remove('highlighted');b.classList.add('dimmed')}
  });

  document.querySelectorAll('.sprint-name').forEach(function(n){
    var row=n.closest('.sprint-row');if(!row)return;
    var ri=parseInt(row.getAttribute('data-emp'));
    if(involved[ri]){n.classList.add('active');n.classList.remove('dimmed')}
    else{n.classList.remove('active');n.classList.add('dimmed')}
  });
  document.querySelectorAll('.sprint-load').forEach(function(l){
    var row=l.closest('.sprint-row');if(!row)return;
    var ri=parseInt(row.getAttribute('data-emp'));
    if(involved[ri])l.classList.remove('dimmed');else l.classList.add('dimmed');
  });

  highlightBar(taskId);
}

function removeHighlight(){
  activeTaskId=null;paintTaskId=null;
  document.querySelectorAll('.sprint-rows .block').forEach(function(b){b.classList.remove('dimmed','highlighted')});
  document.querySelectorAll('.task-item').forEach(function(el){el.classList.remove('active','dimmed')});
  document.querySelectorAll('.special-btn').forEach(function(el){el.classList.remove('active','dimmed')});
  document.querySelectorAll('.sprint-name').forEach(function(n){n.classList.remove('active','dimmed')});
  document.querySelectorAll('.sprint-load').forEach(function(l){l.classList.remove('dimmed')});
  resetBarHighlight();
}

function toggleHighlight(taskId){
  if(activeEmpIdx!==null){
    activeEmpIdx=null;
    document.querySelectorAll('.sprint-name').forEach(function(n){n.classList.remove('active','dimmed')});
    document.querySelectorAll('.sprint-load').forEach(function(l){l.classList.remove('dimmed')});
    updateEmpButton();
  }
  if(activeTaskId===taskId){removeHighlight();paintSnapshot=null;return}
  activeTaskId=taskId;paintTaskId=taskId;
  if(!paintSnapshot)savePaintSnapshot();
  applyHighlight(taskId);
}

function toggleEmpHighlight(empIdx){
  paintTaskId=null;
  if(activeTaskId!==null){activeTaskId=null;document.querySelectorAll('.sprint-rows .block').forEach(function(b){b.classList.remove('dimmed','highlighted')});document.querySelectorAll('.task-item').forEach(function(el){el.classList.remove('active','dimmed')});document.querySelectorAll('.special-btn').forEach(function(el){el.classList.remove('active','dimmed')});resetBarHighlight()}
  var allR=document.querySelectorAll('.sprint-row'),allI=document.querySelectorAll('.task-item');
  if(activeEmpIdx===empIdx){activeEmpIdx=null;allR.forEach(function(r){r.querySelectorAll('.block').forEach(function(b){b.classList.remove('dimmed','highlighted')})});document.querySelectorAll('.sprint-name').forEach(function(n){n.classList.remove('active','dimmed')});document.querySelectorAll('.sprint-load').forEach(function(l){l.classList.remove('dimmed')});allI.forEach(function(el){el.classList.remove('active','dimmed')});document.querySelectorAll('.special-btn').forEach(function(el){el.classList.remove('active','dimmed')});resetBarHighlight();updateEmpButton();return}
  activeEmpIdx=empIdx;var emp=team[empIdx],ids={};emp.tasks.forEach(function(dt){
    if(!Array.isArray(dt))return;
    dt.forEach(function(tid){ids[tid]=true});
  });
  allR.forEach(function(r){var ri=parseInt(r.getAttribute('data-emp'));r.querySelectorAll('.block').forEach(function(b){if(ri===empIdx){b.classList.remove('dimmed');b.classList.add('highlighted')}else{b.classList.remove('highlighted');b.classList.add('dimmed')}})});
  document.querySelectorAll('.sprint-name').forEach(function(n){var row=n.closest('.sprint-row');if(!row)return;var ri=parseInt(row.getAttribute('data-emp'));if(ri===empIdx){n.classList.add('active');n.classList.remove('dimmed')}else{n.classList.remove('active');n.classList.add('dimmed')}});
  document.querySelectorAll('.sprint-load').forEach(function(l){var row=l.closest('.sprint-row');if(!row)return;var ri=parseInt(row.getAttribute('data-emp'));if(ri===empIdx)l.classList.remove('dimmed');else l.classList.add('dimmed')});
  allI.forEach(function(el){var tid=parseInt(el.getAttribute('data-task-id'));if(ids[tid]){el.classList.add('active');el.classList.remove('dimmed')}else{el.classList.remove('active');el.classList.add('dimmed')}});
  highlightBarForEmp(ids);
  updateEmpButton();
}
